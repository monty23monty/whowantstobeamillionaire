{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Register</h2>
  <form method="post">
    <label>Username</label>
    <input name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Create account</button>
  </form>
</div>
{% endblock %}
